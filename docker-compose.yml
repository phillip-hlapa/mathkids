version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: mathkids-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: mathkids-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mathkids
      - JWT_SECRET=change_this_secret_in_production_please
      - ADMIN_PASSWORD=admin123
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: mathkids-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
