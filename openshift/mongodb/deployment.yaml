apiVersion: apps/v1
kind: Deployment
metadata:
  name: mathkids-mongodb
  namespace: mathkids
  labels:
    app: mathkids
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mathkids
      component: mongodb
  strategy:
    type: Recreate          # PVC can only attach to one pod at a time
  template:
    metadata:
      labels:
        app: mathkids
        component: mongodb
    spec:
      # mongo:6.0 runs as UID 999 — fsGroup lets it write to the PVC
      securityContext:
        fsGroup: 999
      containers:
        - name: mongodb
          # MongoDB 6.0 — wire protocol v17, satisfies Mongoose 8 (needs v8+)
          image: docker.io/mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mathkids-secrets
                  key: MONGO_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mathkids-secrets
                  key: MONGO_ADMIN_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: mathkids
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mathkids-mongodb
  namespace: mathkids
  labels:
    app: mathkids
    component: mongodb
spec:
  selector:
    app: mathkids
    component: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None    # Headless service — only reachable inside the cluster